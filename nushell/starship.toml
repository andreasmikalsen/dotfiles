format = '$directory$username$hostname$jobs$all'
add_newline = false
scan_timeout = 5

[directory]
style = "purple bold"
format = '[\[$path\]]($style)[$read_only]($read_only_style) '
read_only = " ro"
truncate_to_repo = false
truncation_length = 0

[username]
format = '[$user]($style)'

[hostname]
format = '[@$hostname]($style) '
style = 'dimmed yellow'
ssh_only = true

[jobs]
style="yellow"
symbol="*"

[character]
disabled=true
format='[$symbol$number]($style) '

[git_commit]
tag_symbol = " tag "

[git_branch]
symbol = "git "
format = "[$branch]($style)"
style = "cyan bold" #"bright-black"

[git_state]
format = '\([$state( $progress_current/$progress_total)]($style)\)'
style = "cyan bold"

[git_status]
style = "cyan bold"
format = '([\[$all_status$ahead_behind\]]($style)) '
conflicted='¤'
up_to_date=''
untracked='?'
stashed='$'
modified='*'
staged='+'
renamed='>'
ahead="!"
behind="¡"
diverged="§"
deleted="&"

[cmd_duration]
disabled=true
format = '[\[$duration\]]($style)'

[aws]
symbol = "aws "
format = '[\[$symbol($profile)(\($region\))(\[$duration\])]($style) '

[bun]
symbol = "bun "
format = '[\[$symbol($version)\]]($style) '
