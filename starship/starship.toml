$python\
$lua\
$nodejs\
$golang\
$kotlin\
$java\
$package\
$docker_context\
$jobs\
$cmd_duration\
$line_break\
$directory\
$git_branch\
$git_status\
$git_metrics\
$git_state\
$character
"""

