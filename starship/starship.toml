palette = "nord"

add_newline = false

[character]
format = "$symbol "

[git_branch]
symbol = " "
format = "on [$symbol$branch]($style) "
style = "purple"

[git_status]
style = "teal"
format = '([$all_status$ahead_behind]($style)) '

staged = "+${count} "
modified = "~${count} "
deleted = "-${count} "
renamed = "»${count} "
untracked = "?${count} "
stashed = "$${count} "
conflicted = "=${count} "

ahead = "⇡${count}"
behind = "⇣${count}"
diverged = "⇕⇡${ahead_count}⇣${behind_count}"
up_to_date = ""

[git_metrics]
disabled = false

[fill]
symbol = " "

[lua]
symbol = ' '

[nodejs]
style = 'blue'
symbol = ' '

[golang]
style = 'blue'
symbol = ' '

[package]
symbol = '󰏗 '

[docker_context]
symbol = ' '
style = 'fg:#06969A'
format = '[$symbol]($style) $path'
detect_files = ['docker-compose.yml', 'docker-compose.yaml', 'Dockerfile']
detect_extensions = ['Dockerfile']

[jobs]
symbol = ' '
style = 'red'
number_threshold = 1
format = '[$symbol]($style)'

[cmd_duration]
min_time = 500
style = 'fg:gray'
format = '[$duration]($style)'

[palettes.nord]
dark_blue = '#5E81AC'
blue = '#81A1C1'
teal = '#88C0D0'
red = '#BF616A'
orange = '#D08770'
green = '#A3BE8C'
yellow = '#EBCB8B'
purple = '#712591'
gray = '#434C5E'
black = '#2E3440'
white='#D8DEE9'

